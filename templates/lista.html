<!DOCTYPE html>
<html lang="pt-BR">
<head>
<link rel="icon" type="image/png" href="{{ url_for('static', filename='logo-icone.png') }}">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Revisão</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --azul: #00609F; --azul-escuro: #063C63; --azul-fundo: #EAF3FA;
    --tinta: #10293D; --tinta-suave: #4C6478; --branco: #FFFFFF; --raio: 16px;
    --sombra: 0 6px 20px rgba(6, 60, 99, 0.08);
  }
  * { box-sizing: border-box; }
  body {
    font-family: 'Inter', system-ui, sans-serif; margin: 0; min-height: 100vh;
    background: #F7FBFE; color: var(--tinta); padding: 24px 16px 60px;
  }
  .topo { max-width: 640px; margin: 0 auto 20px; display: flex; justify-content: space-between; align-items: center; }
  h1 { font-family: 'Baloo 2', sans-serif; color: var(--azul-escuro); font-size: 1.4rem; margin: 0; }
  .sair { color: var(--tinta-suave); font-size: 0.85rem; text-decoration: none; font-weight: 600; }
  .lista { max-width: 640px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }
  .item {
    background: var(--branco); border-radius: var(--raio); box-shadow: var(--sombra);
    padding: 16px 18px; text-decoration: none; color: inherit; display: flex;
    justify-content: space-between; align-items: center; gap: 12px;
  }
  .item .nome { font-weight: 700; font-size: 0.98rem; }
  .item .detalhe { color: var(--tinta-suave); font-size: 0.85rem; margin-top: 2px; }
  .badge-pendencia {
    display: inline-block; margin-top: 4px; padding: 2px 9px; border-radius: 999px;
    background: #FDECEA; color: #C5221F; font-size: 0.72rem; font-weight: 700;
  }
  .item .seta { color: var(--azul); font-size: 1.2rem; }
  .btn-excluir {
    background: none; border: none; color: var(--vermelho, #C5221F); font-size: 0.8rem;
    font-weight: 600; cursor: pointer; padding: 6px 8px; border-radius: 8px; white-space: nowrap;
  }
  .btn-excluir:hover { background: #FDEDEC; }
  .vazio {
    max-width: 640px; margin: 40px auto; text-align: center; color: var(--tinta-suave); font-size: 0.9rem;
  }
</style>
</head>
<body>
  <div class="topo">
    <h1>Aguardando revisão</h1>
    <a class="sair" href="{{ url_for('painel.logout') }}">Sair</a>
  </div>

  <div class="lista">
    {% for aluno in alunos %}
    <div class="item">
      <a style="flex:1; display:flex; justify-content:space-between; align-items:center; text-decoration:none; color:inherit;" href="{{ url_for('painel.revisar', aluno_id=aluno.id) }}">
        <div>
          <div class="nome">{{ aluno.nome }}</div>
          <div class="detalhe">{{ aluno.curso }} · enviado em {{ aluno.criado_em.strftime('%d/%m/%Y') }}</div>
          {% if aluno.status == REPROVADO %}
          <span class="badge-pendencia">Aguardando pendência</span>
          {% endif %}
        </div>
        <span class="seta">→</span>
      </a>
      <button type="button" class="btn-excluir" data-aluno-id="{{ aluno.id }}" data-aluno-nome="{{ aluno.nome }}">Excluir</button>
    </div>
    {% else %}
    <div class="vazio">Nenhum aluno aguardando revisão no momento.</div>
    {% endfor %}
  </div>

<script>
document.querySelectorAll('.btn-excluir').forEach((botao) => {
  botao.addEventListener('click', async () => {
    const alunoId = botao.dataset.alunoId;
    const alunoNome = botao.dataset.alunoNome;
    if (!confirm(`Excluir o envio de "${alunoNome}"? Essa ação não pode ser desfeita.`)) return;

    botao.disabled = true;
    botao.textContent = 'Excluindo...';
    try {
      const resp = await fetch(`/painel/aluno/${alunoId}/excluir`, { method: 'POST' });
      if (!resp.ok) throw new Error('Falha ao excluir');
      botao.closest('.item').remove();
    } catch (e) {
      alert('Não foi possível excluir. Tente novamente.');
      botao.disabled = false;
      botao.textContent = 'Excluir';
    }
  });
});
</script>
</body>
</html>
